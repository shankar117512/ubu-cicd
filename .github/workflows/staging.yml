name: Staging CI/CD
 
on:
  push:
    branches: [staging]
 
jobs:
  test:
    # ... same test job as dev.yml with staging settings
 
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: pip install bandit safety
      - run: bandit -r . -x ./tests,./migrations -ll
      - run: safety check -r requirements/production.txt
 
  build-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/myproject:staging
            ${{ secrets.DOCKER_USERNAME }}/myproject:staging-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/myproject:staging
          cache-to: type=inline
 
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-image
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - run: curl -fsSL https://railway.app/install.sh | sh
      - name: Capture current deployment for rollback
        id: pre
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          ID=$(railway deployments \
            --service ${{ secrets.RAILWAY_STAGING_SERVICE_ID }} \
            --environment staging --json | jq -r '.[0].id')
          echo "prev_id=$ID" >> $GITHUB_OUTPUT
      - name: Deploy
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway environment use staging
          railway up --service ${{ secrets.RAILWAY_STAGING_SERVICE_ID }}
      - name: Integration tests against staging
        run: |
          pip install requests pytest
          pytest tests/integration/ --base-url=https://staging.yourdomain.com -v
      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway deployments rollback ${{ steps.pre.outputs.prev_id }} \
            --service ${{ secrets.RAILWAY_STAGING_SERVICE_ID }}
