name: Development CI/CD

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: myproject.settings.development

jobs:

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=venv,migrations,__pycache__,.git

      - name: Run black check
        run: black --check . --line-length=120

      - name: Run isort check
        run: isort --check-only .

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key
          ALLOWED_HOSTS: localhost
        run: python manage.py migrate

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key
          ALLOWED_HOSTS: localhost
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80 -v

      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway whoami
          railway environment development
          railway up --service ${{ secrets.RAILWAY_DEV_SERVICE_ID }} --detach

      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ubu-cicd-development.up.railway.app/health/)

        if [ "$STATUS" = "200" ]; then
          echo "Smoke test passed!"
        else
          echo "Smoke test failed!"
          exit 1
        fi
